<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Powder Root | Artisanal Boutique</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="loading">

    <div id="preloader">
        <div class="loader-content">
            <div class="brand-name">POWDER <span>ROOT</span></div>
            <div class="loader-bar"></div>
        </div>
    </div>

    <nav id="main-nav">
        <div class="nav-left">
            <img src="assets/images/logo.jpg" class="premium-logo" alt="Logo">
            <div class="brand-name">POWDER <span>ROOT</span></div>
        </div>

        <div class="nav-right">
            <a href="https://instagram.com/powderroot" target="_blank" class="social-link"><i class="fa-brands fa-instagram"></i></a>
            
            <button id="auth-btn" class="login-minimal" onclick="handleAuth()">LOGIN</button>
            
            <div id="user-profile" class="user-chip hidden">
                <div class="avatar-wrapper">
                    <img id="user-img" src="" alt="" class="circular-avatar">
                </div>
                <button id="logout-btn" onclick="handleLogout()" title="Logout"><i class="fa-solid fa-power-off"></i></button>
            </div>

            <div class="bag-icon" onclick="toggleCart()">
                <i class="fa-solid fa-bag-shopping"></i>
                <span id="bag-count">0</span>
            </div>
        </div>
    </nav>

    <main id="home-view">
        <section class="hero">
            <video autoplay muted loop playsinline id="bg-video">
                <source src="assets/video/bg.mp4" type="video/mp4">
            </video>
            <div class="video-overlay"></div>
            
            <div class="hero-content">
                <h1 class="reveal-text">PURE<span>.</span></h1>
                <h1 class="reveal-text">RAW<span>.</span></h1>
                <h1 class="reveal-text gold">POTENT<span>.</span></h1>
            </div>
        </section>
        <div id="product-grid" class="editorial-grid"></div>
    </main>

    <section id="detail-view" class="hidden"></section>

    <div id="cart-overlay" onclick="toggleCart()"></div>
    <div id="cart-drawer" class="cart-drawer">
        <div class="cart-header">
            <h2>YOUR BAG</h2>
            <i class="fa-solid fa-xmark" onclick="toggleCart()" style="cursor:pointer;"></i>
        </div>
        <div id="cart-items"></div>
        <div class="checkout-footer">
            <div class="bill-row"><span>TOTAL</span><span id="cart-total">₹0</span></div>
            <input type="text" id="shipping-address" placeholder="SHIPPING ADDRESS">
            <div id="payment-gate" class="hidden">
                <button class="whatsapp-btn" onclick="sendToWhatsApp()">CONFIRM ON WHATSAPP</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
