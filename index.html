<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POWDER ROOT | Artisanal Indian Spices</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="trust-bar">
        <div class="scrolling-content">
            <span><i class="fa-solid fa-crown"></i> VEDIC PURITY</span>
            <span><i class="fa-solid fa-bolt"></i> DIRECT UPI SETTLEMENT</span>
            <span><i class="fa-solid fa-leaf"></i> NO ADDED FILLERS</span>
            <span><i class="fa-solid fa-truck-fast"></i> LUXURY SHIPPING</span>
        </div>
    </div>

    <section class="hero">
        <div class="video-container">
            <video autoplay muted loop playsinline id="bg-video" poster="assets/images/placeholder.jpg">
                <source src="assets/video/bg.mp4" type="video/mp4">
            </video>
            <div class="video-overlay"></div>
        </div>
        
        <nav>
            <div class="brand-identity">
                <img src="assets/images/logo.png" alt="Logo" class="premium-logo">
                <div class="brand-name">POWDER<span>ROOT</span></div>
            </div>

            <div class="nav-actions">
                <div id="user-profile" class="user-chip hidden">
                    <img id="user-img" src="" alt="Profile">
                </div>
                <button id="auth-btn" class="gold-outline-btn" onclick="handleAuth()">LOGIN</button>
                <button id="logout-btn" class="gold-outline-btn hidden" onclick="handleLogout()">LOGOUT</button>
                <div class="bag-icon" onclick="toggleCart()">
                    <i class="fa-solid fa-bag-shopping"></i>
                    <span id="bag-count">0</span>
                </div>
            </div>
        </nav>

        <div class="hero-statement">
            <h1>CONCENTRATED<br>EARTH.</h1>
            <div class="scroll-hint"><span>THE HARVEST</span></div>
        </div>
    </section>

    <main class="boutique">
        <div id="product-grid" class="product-grid"></div>
    </main>

    <div id="cart-drawer" class="cart-drawer">
        <div class="drawer-header">
            <h3>YOUR BAG</h3>
            <i class="fa-solid fa-xmark" onclick="toggleCart()"></i>
        </div>
        
        <div id="cart-items" class="cart-items"></div>

        <div class="drawer-footer">
            <div class="bill-row"><span>SUBTOTAL</span><span id="cart-total">₹0</span></div>
            
            <div id="payment-gate" class="locked-gate hidden">
                <div class="upi-box">
                    <p>OFFICIAL UPI GATEWAY</p>
                    <div id="qr-code"></div>
                    <div class="merchant-notice"><i class="fa-solid fa-circle-check"></i> POWDER ROOT (SPC)</div>
                </div>
                <button class="whatsapp-sync-btn" onclick="sendToWhatsApp()">
                    CONFIRM & SEND RECEIPT
                </button>
            </div>

            <div id="lock-notice" class="lock-notice">
                <i class="fa-solid fa-lock"></i> Login & provide address to pay
            </div>

            <div class="address-field">
                <input type="text" id="shipping-address" placeholder="SHIPPING ADDRESS" oninput="validateState()">
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
