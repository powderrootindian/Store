<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powder Root | Artisanal Spice Boutique</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;700;800&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/your-font-awesome-key.js" crossorigin="anonymous"></script>
    
    <meta property="og:title" content="Powder Root | Premium Spices">
    <meta property="og:description" content="Artisanal Garlic, Onion, and Ginger powders for the modern kitchen.">
    <meta property="og:image" content="assets/images/social-preview.jpg">

    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body>

    <div class="trust-bar">
        <div class="scrolling-content">
            <span>PREMIUM ARTISANAL HARVEST 2026</span>
            <span>SHIPPING NATIONWIDE</span>
            <span>PURE • RAW • POTENT</span>
        </div>
    </div>

    <nav>
        <div class="brand-identity">
            <img src="assets/images/logo.jpg" class="premium-logo" alt="Logo">
            <div class="brand-name">POWDER <span>ROOT</span></div>
        </div>
        <div class="nav-actions">
            <button id="auth-btn" class="gold-outline-btn" onclick="handleAuth()">LOGIN</button>
            <div id="user-profile" class="user-chip hidden">
                <img id="user-img" src="" alt="User">
                <button id="logout-btn" onclick="handleLogout()"><i class="fa-solid fa-power-off"></i></button>
            </div>
            <div class="bag-icon" onclick="toggleCart()">
                <i class="fa-solid fa-bag-shopping"></i>
                <span id="bag-count">0</span>
            </div>
        </div>
    </nav>

    <section class="hero">
        <div class="video-container">
            <video autoplay muted loop playsinline id="bg-video">
                <source src="assets/video/bg.mp4" type="video/mp4">
            </video>
            <div class="video-overlay"></div>
        </div>
        <div class="hero-statement">
            <h1>ELEVATE EVERY <br><span>FLAVOR</span></h1>
            <p class="scroll-hint">Discover the Collection</p>
        </div>
    </section>

    <section class="boutique">
        <div id="product-grid" class="product-grid"></div>
    </section>

    <div id="cart-drawer" class="cart-drawer">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px;">
            <h2 style="font-family:'Cinzel';">YOUR BAG</h2>
            <i class="fa-solid fa-xmark" style="cursor:pointer; font-size:1.5rem;" onclick="toggleCart()"></i>
        </div>

        <div id="cart-items"></div>

        <div class="bill-summary">
            <div class="bill-row"><span>SUBTOTAL</span><span id="cart-total">₹0</span></div>
            
            <div class="address-field">
                <input type="text" id="shipping-address" oninput="validateState()" placeholder="Shipping Address / पत्ता टाका">
            </div>

            <div id="lock-notice" class="lock-notice">
                Login & Add Address to Unlock / पेमेंटसाठी पत्ता टाका
            </div>

            <div id="payment-gate" class="hidden">
                <div class="upi-box">
                    <p style="font-size:0.7rem; margin-bottom:10px; font-weight:700;">SCAN TO PAY VIA UPI</p>
                    <div id="qr-code"></div>
                </div>
                <button class="whatsapp-sync-btn" onclick="sendToWhatsApp()">
                    Confirm & Sync Order
                </button>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
